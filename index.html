<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password strength checker</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f5f5f5;
            max-width: 400px;
            margin: 100px auto;
            padding: 0 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background-color: #333;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #555;
        }
        p {
            font-size: 18px;
            font-weight: bold;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <h1>Password strength checker</h1>
    <input type="password" id="pw" placeholder="Type a password..." />
    <button id="toggle">Show</button>

    <p id="result">Enter a password</p>

    <script>
        const input = document.getElementById("pw");
        const toggle = document.getElementById("toggle")

        input.addEventListener("input", function() {
            const password = input.value;
            const result = document.getElementById("result");

            let score = 0;
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            if(/[A-Z]/.test(password)) score++;
            if(/[0-9]/.test(password)) score++;
            if(/[^A-Za-z0-9]/.test(password)) score++;

            if (password.length === 0) {
                result.textContent = "Enter a password";
                result.style.color = "gray";
            } else if (score <= 1) {
                result.textContent = "Weak";
                result.style.color = "red";
            } else if (score === 2) {
                result.textContent = "Fair";
                result.style.color = "orange";
            } else if (score === 3) {
                result.textContent = "Good";
                result.style.color = "steelblue";
            } else {
                result.textContent = "Strong";
                result.style.color = "green";
            }
        });

        toggle.addEventListener("click", function() {
                if (input.type === "password") {
                    input.type = "text";
                    toggle.textContent = "Hide"
                } else {
                    input.type = "password";
                    toggle.textContent = "Show"
                }
            });
    </script>
</body>
</html>
