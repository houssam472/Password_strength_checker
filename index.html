<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password strength checker</title>
</head>
<body>
    <h1>Password strength checker</h1>
    <input type="password" id="pw" placeholder="Type a password..." />

    <p id="result">Enter a password</p>

    <script>
        const input = document.getElementById("pw");

        input.addEventListener("input", function() {
            const password = input.value;
            const result = document.getElementById("result");

            if (password.length < 8) {
                result.textContent = "Too short - needs more than 8 characters";
            } else if (!/[A-Z]/.test(password)) {
                result.textContent = "Add an uppercase letter";
            } else if (!/[0-9]/.test(password)) {
                result.textContent = "Add a number";
            } else if (!/[^A-Za-z0-9]/.test(password)) {
                result.textContent = "Add a symbol (!@#...)";
            } else {
                result.textContent = "Strong password!"
            }
        });
    </script>
</body>
</html>
