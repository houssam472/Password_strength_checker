<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password strength checker</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f5f5f5;
            max-width: 400px;
            margin: 100px auto;
            padding: 0 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 24px;
        }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background-color: #333;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #555;
        }
        p {
            font-size: 18px;
            font-weight: bold;
            margin-top: 16px;
        }
        #bar-track {
            height: 6px;
            background-color: #ddd;
            border-radius: 99px;
            margin-top: 16px;
            overflow: hidden;
        }
        #bar {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            transition: width 0.3s, background-color 0.3s;
        }
    </style>
</head>
<body>
    <h1>Password strength checker</h1>
    <input type="password" id="pw" placeholder="Type a password..." />
    <button id="toggle">Show</button>

    <div id="bar-track">
        <div id="bar"></div>
    </div>

    <p id="result">Enter a password</p>

    <script>
        const input = document.getElementById("pw");
        const toggle = document.getElementById("toggle")
        const bar = document.getElementById("bar");


        input.addEventListener("input", function() {
            const password = input.value;
            const result = document.getElementById("result");

            let score = 0;
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            if(/[A-Z]/.test(password)) score++;
            if(/[0-9]/.test(password)) score++;
            if(/[^A-Za-z0-9]/.test(password)) score++;

            if (password.length === 0) {
                result.textContent = "Enter a password";
                result.style.color = "gray";
                bar.style.width = "0%";
            } else if (score <= 1) {
                result.textContent = "Weak";
                result.style.color = "red";
                bar.style.width = "25%";
                bar.style.backgroundColor = "red";
            } else if (score === 2) {
                result.textContent = "Fair";
                result.style.color = "orange";
                bar.style.width = "50%";
                bar.style.backgroundColor = "orange";
            } else if (score === 3) {
                result.textContent = "Good";
                result.style.color = "steelblue";
                bar.style.width = "75%";
                bar.style.backgroundColor = "steelblue"
            } else {
                result.textContent = "Strong";
                result.style.color = "green";
                bar.style.width = "100%";
                bar.style.backgroundColor = "green";
            }
        });

        toggle.addEventListener("click", function() {
                if (input.type === "password") {
                    input.type = "text";
                    toggle.textContent = "Hide"
                } else {
                    input.type = "password";
                    toggle.textContent = "Show"
                }
        });
    </script>
</body>
</html>
